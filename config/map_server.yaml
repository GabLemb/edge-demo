# /mnt/nvme/ros2_ws/src/swarm_arena/config/map_server.yaml
map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: arena_map.yaml
    frame_id: map
    topic_name: /map

# Lifecycle manager: porta map_server in stato 'active' al boot.
# Nav2 in Foxy usa lifecycle nodes — non si attivano da soli.
map_server_lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names: ["map_server"]
    bond_timeout: 0.0