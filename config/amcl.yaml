# /mnt/nvme/ros2_ws/src/swarm_arena/config/amcl.yaml
amcl:
  ros__parameters:
    use_sim_time: true

    # Frame
    base_frame_id: "base_footprint"     # verrà prefissato a runtime via remappings
    odom_frame_id: "odom"               # idem
    global_frame_id: "map"              # condiviso, no prefisso

    # Topic
    scan_topic: "scan"                  # relativo al namespace
    map_topic: "/map"                   # globale

    # Modello del moto (differential drive)
    robot_model_type: "differential"
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    # Modello del laser
    laser_model_type: "likelihood_field"
    laser_min_range: -1.0               # usa quello del sensore
    laser_max_range: 100.0
    max_beams: 60
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    sigma_hit: 0.2
    lambda_short: 0.1

    # Sampling
    min_particles: 200
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25

    # Comportamento
    tf_broadcast: true
    set_initial_pose: true
    always_reset_initial_pose: false
    first_map_only: false