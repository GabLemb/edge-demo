# /mnt/nvme/ros2_ws/src/swarm_arena/config/slam_mapping.yaml
slam_toolbox:
  ros__parameters:
    # Modalità mapping (non localization)
    mode: mapping

    # Frame globali e robot
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /observer_1/scan
    
    # Update parameters
    use_sim_time: true
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.05
    map_update_interval: 1.0
    resolution: 0.05
    max_laser_range: 8.0
    minimum_time_interval: 0.2
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    
    # SLAM tuning (valori conservativi, robusti)
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.2
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1